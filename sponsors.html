<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsors — MAFLA 2026</title>
<meta name="theme-color" content="#5c1526">
<style>
  :root { --navy: #5c1526; --gold: #c9a13b; --bg: #f7f5f0; --text: #2b2b2b; --muted: #6b6b6b; --border: #e2ded4; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: white; padding: 2rem 1.5rem; text-align: center; }
  header h1 { margin: 0 0 0.3rem; font-size: 1.6rem; }
  .back-link { display:inline-block; margin-top:0.75rem; color: var(--gold); text-decoration:none; font-size:0.9rem; font-weight:600; }
  main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .tier { margin-bottom: 2rem; }
  .tier h2 { color: var(--navy); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--navy); padding-bottom: 0.4rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-top: 1rem; }
  .slot { background: white; border: 1px dashed var(--border); border-radius: 10px; height: 100px; display:flex; align-items:center; justify-content:center; color: var(--muted); font-size: 0.85rem; font-style: italic; text-align:center; padding: 0.5rem; }
  footer { text-align:center; font-size:0.8rem; color:#8a8a8a; padding: 1.5rem 0 2.5rem; }
</style>
</head>
<body>
<header>
  <h1>Our Sponsors</h1>
  <a class="back-link" href="index.html">← Back to Conference Home</a>
</header>
<main>
  <div class="tier">
    <h2>Platinum Sponsors</h2>
    <div class="grid">
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
    </div>
  </div>
  <div class="tier">
    <h2>Gold Sponsors</h2>
    <div class="grid">
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
    </div>
  </div>
  <div class="tier">
    <h2>Exhibitors</h2>
    <div class="grid">
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
      <div class="slot">Add logo/link</div>
    </div>
  </div>
</main>
<footer>Massachusetts Foreign Language Association — MAFLA 2026</footer>
</body>
</html>
